# =============================================================================
# Validate and Deploy
#
# Full CI/CD pipeline for the multiapp monorepo:
#   - On pull_request: validates changed apps (lint, typecheck, test, build, e2e)
#   - On push to staging: validates AND deploys to staging environment
#   - On push to main: validates AND deploys to production environment
#
# All validation gates must pass before any deployment is allowed.
# Change detection ensures only affected apps are processed.
# Changes to packages/** trigger all SPA apps that depend on them.
# =============================================================================

name: Validate and Deploy

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which apps have changes
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      admin-spa: ${{ steps.filter.outputs.admin-spa }}
      portal-spa: ${{ steps.filter.outputs.portal-spa }}
      main-site: ${{ steps.filter.outputs.main-site }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin-spa:
              - 'apps/admin-spa/**'
              - 'packages/**'
            portal-spa:
              - 'apps/portal-spa/**'
              - 'packages/**'
            main-site:
              - 'apps/main-site/**'

  # ---------------------------------------------------------------------------
  # Validation gates (run in parallel)
  # ---------------------------------------------------------------------------
  format-check:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.admin-spa == 'true' ||
      needs.detect-changes.outputs.portal-spa == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  lint:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.admin-spa == 'true' ||
      needs.detect-changes.outputs.portal-spa == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.admin-spa == 'true' ||
      needs.detect-changes.outputs.portal-spa == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit-tests:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.admin-spa == 'true' ||
      needs.detect-changes.outputs.portal-spa == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  security-audit:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.admin-spa == 'true' ||
      needs.detect-changes.outputs.portal-spa == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # Build apps (produces artifacts for E2E and deploy)
  # ---------------------------------------------------------------------------
  build-admin-spa:
    needs: detect-changes
    if: needs.detect-changes.outputs.admin-spa == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build admin-spa
        run: bash scripts/build-spa.sh admin-spa
      - uses: actions/upload-artifact@v4
        with:
          name: admin-spa-dist
          path: apps/admin-spa/dist/
          retention-days: 1

  build-portal-spa:
    needs: detect-changes
    if: needs.detect-changes.outputs.portal-spa == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build portal-spa
        run: bash scripts/build-spa.sh portal-spa
      - uses: actions/upload-artifact@v4
        with:
          name: portal-spa-dist
          path: apps/portal-spa/dist/
          retention-days: 1

  validate-main-site:
    needs: detect-changes
    if: needs.detect-changes.outputs.main-site == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/build-main-site.sh

  # ---------------------------------------------------------------------------
  # E2E tests (needs builds — runs against Docker + nginx)
  # ---------------------------------------------------------------------------
  e2e-tests:
    needs: [detect-changes, build-admin-spa, build-portal-spa]
    if: >-
      always() &&
      (needs.build-admin-spa.result == 'success' || needs.build-admin-spa.result == 'skipped') &&
      (needs.build-portal-spa.result == 'success' || needs.build-portal-spa.result == 'skipped') &&
      (needs.detect-changes.outputs.admin-spa == 'true' ||
       needs.detect-changes.outputs.portal-spa == 'true' ||
       needs.detect-changes.outputs.main-site == 'true')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      # Download build artifacts (if they exist)
      - uses: actions/download-artifact@v4
        with:
          name: admin-spa-dist
          path: apps/admin-spa/dist/
        if: needs.detect-changes.outputs.admin-spa == 'true'

      - uses: actions/download-artifact@v4
        with:
          name: portal-spa-dist
          path: apps/portal-spa/dist/
        if: needs.detect-changes.outputs.portal-spa == 'true'

      # Build any SPAs that weren't changed (E2E tests need all apps)
      - name: Build admin-spa (if not changed)
        if: needs.detect-changes.outputs.admin-spa != 'true'
        run: bash scripts/build-spa.sh admin-spa

      - name: Build portal-spa (if not changed)
        if: needs.detect-changes.outputs.portal-spa != 'true'
        run: bash scripts/build-spa.sh portal-spa

      - name: Start Docker environment
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml up -d --wait
        timeout-minutes: 3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop Docker environment
        if: always()
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml down

  # ---------------------------------------------------------------------------
  # Staging deploy (only on push to staging branch)
  # ---------------------------------------------------------------------------
  staging-deploy-admin-spa:
    needs: [detect-changes, lint, typecheck, unit-tests, e2e-tests, security-audit, format-check]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/staging' &&
      needs.detect-changes.outputs.admin-spa == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.security-audit.result == 'success' || needs.security-audit.result == 'skipped') &&
      (needs.format-check.result == 'success' || needs.format-check.result == 'skipped')
    runs-on: ubuntu-24.04
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Build admin-spa (staging)
        run: bash scripts/build-spa.sh admin-spa staging

      - name: Configure SSH
        run: bash scripts/ssh-setup.sh
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_STAGING_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_STAGING_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_STAGING_USER }}

      - name: Deploy admin-spa to staging
        run: bash scripts/deploy-spa.sh admin-spa
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_STAGING_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_STAGING_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_STAGING_USER }}
          DEPLOY_ADMIN_SPA_PATH: ${{ secrets.DEPLOY_STAGING_ADMIN_SPA_PATH }}

      - name: Health check
        run: bash scripts/health-check.sh
        env:
          HEALTH_CHECK_URL: ${{ secrets.DEPLOY_STAGING_HOST }}
          HEALTH_CHECK_PATH: /admin/
        continue-on-error: true

  staging-deploy-portal-spa:
    needs: [detect-changes, lint, typecheck, unit-tests, e2e-tests, security-audit, format-check]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/staging' &&
      needs.detect-changes.outputs.portal-spa == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.security-audit.result == 'success' || needs.security-audit.result == 'skipped') &&
      (needs.format-check.result == 'success' || needs.format-check.result == 'skipped')
    runs-on: ubuntu-24.04
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Build portal-spa (staging)
        run: bash scripts/build-spa.sh portal-spa staging

      - name: Configure SSH
        run: bash scripts/ssh-setup.sh
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_STAGING_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_STAGING_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_STAGING_USER }}

      - name: Deploy portal-spa to staging
        run: bash scripts/deploy-spa.sh portal-spa
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_STAGING_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_STAGING_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_STAGING_USER }}
          DEPLOY_PORTAL_SPA_PATH: ${{ secrets.DEPLOY_STAGING_PORTAL_SPA_PATH }}

      - name: Health check
        run: bash scripts/health-check.sh
        env:
          HEALTH_CHECK_URL: ${{ secrets.DEPLOY_STAGING_HOST }}
          HEALTH_CHECK_PATH: /portal/
        continue-on-error: true

  staging-deploy-main-site:
    needs: [detect-changes, e2e-tests]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/staging' &&
      needs.detect-changes.outputs.main-site == 'true' &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped')
    runs-on: ubuntu-24.04
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Validate main site
        run: bash scripts/build-main-site.sh

      - name: Configure SSH
        run: bash scripts/ssh-setup.sh
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_STAGING_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_STAGING_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_STAGING_USER }}

      - name: Deploy main site to staging
        run: bash scripts/deploy-main-site.sh
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_STAGING_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_STAGING_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_STAGING_USER }}
          DEPLOY_MAIN_SITE_PATH: ${{ secrets.DEPLOY_STAGING_MAIN_SITE_PATH }}

      - name: Health check
        run: bash scripts/health-check.sh
        env:
          HEALTH_CHECK_URL: ${{ secrets.DEPLOY_STAGING_HOST }}
          HEALTH_CHECK_PATH: /
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Production deploy (only on push to main, needs ALL validation)
  # ---------------------------------------------------------------------------
  deploy-admin-spa:
    needs:
      [
        detect-changes,
        build-admin-spa,
        lint,
        typecheck,
        unit-tests,
        e2e-tests,
        security-audit,
        format-check,
      ]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.admin-spa == 'true' &&
      needs.build-admin-spa.result == 'success' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.security-audit.result == 'success' || needs.security-audit.result == 'skipped') &&
      (needs.format-check.result == 'success' || needs.format-check.result == 'skipped')
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download admin-spa build artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-spa-dist
          path: apps/admin-spa/dist/

      - name: Configure SSH
        run: bash scripts/ssh-setup.sh
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Deploy admin-spa
        run: bash scripts/deploy-spa.sh admin-spa
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ADMIN_SPA_PATH: ${{ secrets.DEPLOY_ADMIN_SPA_PATH }}

      - name: Health check
        run: bash scripts/health-check.sh
        env:
          HEALTH_CHECK_URL: ${{ secrets.DEPLOY_HOST }}
          HEALTH_CHECK_PATH: /admin/

  deploy-portal-spa:
    needs:
      [
        detect-changes,
        build-portal-spa,
        lint,
        typecheck,
        unit-tests,
        e2e-tests,
        security-audit,
        format-check,
      ]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.portal-spa == 'true' &&
      needs.build-portal-spa.result == 'success' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.security-audit.result == 'success' || needs.security-audit.result == 'skipped') &&
      (needs.format-check.result == 'success' || needs.format-check.result == 'skipped')
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download portal-spa build artifact
        uses: actions/download-artifact@v4
        with:
          name: portal-spa-dist
          path: apps/portal-spa/dist/

      - name: Configure SSH
        run: bash scripts/ssh-setup.sh
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Deploy portal-spa
        run: bash scripts/deploy-spa.sh portal-spa
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORTAL_SPA_PATH: ${{ secrets.DEPLOY_PORTAL_SPA_PATH }}

      - name: Health check
        run: bash scripts/health-check.sh
        env:
          HEALTH_CHECK_URL: ${{ secrets.DEPLOY_HOST }}
          HEALTH_CHECK_PATH: /portal/

  deploy-main-site:
    needs: [detect-changes, e2e-tests]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.main-site == 'true' &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped')
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate main site
        run: bash scripts/build-main-site.sh

      - name: Configure SSH
        run: bash scripts/ssh-setup.sh
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Deploy main site
        run: bash scripts/deploy-main-site.sh
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_MAIN_SITE_PATH: ${{ secrets.DEPLOY_MAIN_SITE_PATH }}

      - name: Health check
        run: bash scripts/health-check.sh
        env:
          HEALTH_CHECK_URL: ${{ secrets.DEPLOY_HOST }}
          HEALTH_CHECK_PATH: /
