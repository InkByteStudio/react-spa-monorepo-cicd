name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: app
    attributes:
      label: Affected App
      description: Which app is affected?
      options:
        - main-site
        - admin-spa
        - portal-spa
        - shared-ui
        - shared-utils
        - CI/CD pipeline
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node version, etc.
      placeholder: |
        - OS: Ubuntu 22.04
        - Node: v22.x
        - pnpm: v10.x
        - Browser: Chrome 120

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Any relevant error output, logs, or screenshots.
