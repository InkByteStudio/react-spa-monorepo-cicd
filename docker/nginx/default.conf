server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Main site — served from root
    location / {
        root /srv/main-site;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin SPA — served from /admin/
    location /admin/ {
        alias /srv/admin-spa/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Portal SPA — served from /portal/
    location /portal/ {
        alias /srv/portal-spa/;
        try_files $uri $uri/ /portal/index.html;
    }
}
